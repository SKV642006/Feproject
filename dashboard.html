<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            color: #333;
        }

        h1 {
            color: #1E3A5F;
            margin-bottom: 50px;
            font-size: 2.2rem;
            font-weight: 600;
            text-align: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .nav-card {
            background-color: #ffffff;
            color: #1E3A5F;
            text-decoration: none;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            border: 1px solid transparent;
        }

        .nav-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            border-color: #e2e8f0;
            color: #2E5077;
        }
    </style>
</head>
<body>

    <h1>Credit Risk Dashboard</h1>

    <div class="dashboard-container">
        <a href="/upload" class="nav-card">Upload Training Dataset</a>
        <a href="/cleaning" class="nav-card">Data Cleaning & Feature Engineering</a>
        <a href="/woe" class="nav-card">WoE / IV Analysis</a>
        <a href="/model" class="nav-card">Credit Risk Modeling</a>
        <a href="/scorecard" class="nav-card">Credit Scorecard</a>
        <a href="/monitor" class="nav-card">Upload Monitoring Dataset</a>
        <a href="/monitor" class="nav-card">Model Monitoring Dashboard</a>
    </div>

</body>
</html>
